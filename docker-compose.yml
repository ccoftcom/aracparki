services:
  postgres:
    image: postgres:17-alpine
    container_name: aracparki-postgres
    environment:
      POSTGRES_DB: aracparki
      POSTGRES_USER: aracparki
      POSTGRES_PASSWORD: aracparki
    ports:
      - "5432:5432"
    volumes:
      - aracparki_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aracparki -d aracparki"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aracparki

  redis:
    image: redis:7-alpine
    container_name: aracparki-redis
    # Local-only: no auth. Production must set requirepass / ACL via managed Redis.
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --tcp-keepalive
      - "60"
    ports:
      # Host 6380 avoids clash with a system Redis on 6379.
      - "6380:6379"
    volumes:
      - aracparki_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - aracparki
    restart: unless-stopped

volumes:
  aracparki_pg:
  aracparki_redis:

networks:
  aracparki:
    driver: bridge
